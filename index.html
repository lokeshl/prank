<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Kiss Please 💋</title><style>body{margin:0;height:100vh;overflow:hidden;font-family:Arial,sans-serif;display:flex;align-items:center;justify-content:center;position:relative}body::before{content:'';position:fixed;inset:0;background:url('/mnt/data/WhatsApp Image 2026-04-28 at 11.32.25 PM(1).jpeg') center/cover no-repeat;z-index:-2}.overlay{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:-1}.card{text-align:center;color:#fff;padding:20px}.q{font-size:42px;font-weight:700;text-shadow:0 4px 10px rgba(0,0,0,.4);margin-bottom:30px}.btnwrap{display:flex;gap:18px;justify-content:center;align-items:center}button{border:none;border-radius:999px;cursor:pointer;transition:.2s;position:relative;z-index:3}#yes{padding:12px 18px;font-size:18px;background:#ff4d88;color:#fff}#study{padding:18px 30px;font-size:24px;background:#fff;color:#ff4d88}.floating{position:fixed}.result{position:fixed;inset:0;background:url('/mnt/data/WhatsApp Image 2026-04-28 at 11.32.24 PM (1)(1).jpeg') center/cover no-repeat;display:none}.result.show{display:block}.msg{position:absolute;bottom:8%;width:100%;text-align:center;color:#fff;font-size:38px;font-weight:700;text-shadow:0 4px 10px rgba(0,0,0,.5)}</style></head><body><div class='overlay'></div><div class='card'><div class='q'>Can I get a kiss? 💋</div><div class='btnwrap'><button id='yes'>Please 💖</button><button id='study'>Let me study 📚</button></div></div><div class='result' id='result'><div class='overlay'></div><div class='msg'>Yayyy 😘</div></div><script>const yes=document.getElementById('yes'),study=document.getElementById('study'),res=document.getElementById('result');let s=1,moved=false;function move(){if(!moved){study.classList.add('floating');moved=true;}const pad=20;const w=innerWidth-study.offsetWidth-pad;const h=innerHeight-study.offsetHeight-pad;study.style.left=Math.random()*w+'px';study.style.top=Math.random()*h+'px';s+=0.18;yes.style.transform='scale('+s+')';yes.textContent='Pleaseee 💖';}study.onmouseenter=move;study.onclick=move;yes.onclick=()=>{res.classList.add('show');document.querySelector('.card').style.display='none';};</script></body></html>
